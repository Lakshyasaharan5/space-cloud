spring.application.name=master

spring.datasource.url=jdbc:postgresql://localhost:5432/spacecloud
spring.datasource.username=lakshyasaharan
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

################# gRPC #################
# Define the three distinct channels
spring.grpc.client.channels.datanode1.address=static://localhost:9091
spring.grpc.client.channels.datanode2.address=static://localhost:9092
spring.grpc.client.channels.datanode3.address=static://localhost:9093

# Optional: Disable TLS for local development
spring.grpc.client.channels.datanode1.negotiation-type=plaintext
spring.grpc.client.channels.datanode2.negotiation-type=plaintext
spring.grpc.client.channels.datanode3.negotiation-type=plaintext

################# Kafka #################
spring.kafka.bootstrap-servers=localhost:9095

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer

spring.kafka.producer.retries=0
spring.kafka.producer.properties.max.block.ms=1000
spring.kafka.producer.properties.delivery.timeout.ms=2000
spring.kafka.producer.properties.request.timeout.ms=1000