################# gRPC #################
# Define the three distinct channels
spring.grpc.client.channels.datanode1.address=static://localhost:9091
spring.grpc.client.channels.datanode2.address=static://localhost:9092
spring.grpc.client.channels.datanode3.address=static://localhost:9093

# Optional: Disable TLS for local development
spring.grpc.client.channels.datanode1.negotiation-type=plaintext
spring.grpc.client.channels.datanode2.negotiation-type=plaintext
spring.grpc.client.channels.datanode3.negotiation-type=plaintext